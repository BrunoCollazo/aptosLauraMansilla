spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

FISERV_NET_ID=test-net-id
FISERV_BASE_URL=https://test.api.fiserv.com
FISERV_PAGE_URL=https://test.page.fiserv.com
FISERV_CALLBACK_URL_CODE=test-callback
FISERV_KEYSTORE_PATH=test-keystore.jks
FISERV_KEYSTORE_PASS=test-pass
FISERV_KEY_ALIAS=test-alias
FISERV_KEY_PASS=test-pass
FISERV_PUBLIC_CERT_PATH=test-cert.cer
FISERV_VERSION=3.02
