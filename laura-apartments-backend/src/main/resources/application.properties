spring.application.name=laura-apartments-backend

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Fiserv Carat Gateway Integration
FISERV_NET_ID=${FISERV_NET_ID:}
FISERV_BASE_URL=${FISERV_BASE_URL:}
FISERV_PAGE_URL=${FISERV_PAGE_URL:}
# FISERV_CALLBACK_URL_CODE: Pre-registered code at Fiserv for the callback URL
FISERV_CALLBACK_URL_CODE=${FISERV_CALLBACK_URL_CODE:}
FISERV_KEYSTORE_PATH=${FISERV_KEYSTORE_PATH:}
FISERV_KEYSTORE_PASS=${FISERV_KEYSTORE_PASS:}
FISERV_KEY_ALIAS=${FISERV_KEY_ALIAS:}
FISERV_KEY_PASS=${FISERV_KEY_PASS:}
FISERV_PUBLIC_CERT_PATH=${FISERV_PUBLIC_CERT_PATH:}
FISERV_VERSION=3.02